<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Endpoint Not Found | T-Suite</title>
  
  <link rel="icon" href="https://i.ibb.co/TDz4dgVp/TNG-Logo.png" id="favicon" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex items-center justify-center h-screen overflow-hidden text-gray-800 fade-in relative">

  <div class="absolute inset-0 opacity-5" style="background-image: linear-gradient(#ffffff 1px, transparent 1px), linear-gradient(90deg, #ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>

  <div class="bg-white p-10 md:p-14 rounded-sm shadow-2xl w-full max-w-lg relative overflow-hidden z-10 border border-gray-300 text-center">
    
    <div class="absolute top-0 left-0 w-full h-1.5 bg-[#D71A21]"></div>
    
    <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-100">
      <i class="fa-solid fa-triangle-exclamation text-4xl text-[#D71A21]"></i>
    </div>

    <h1 class="text-2xl font-serif font-bold text-[#0f172a] uppercase tracking-widest mb-1">T-Suite</h1>
    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-8 border-b border-gray-200 pb-6">Tyler Nicholas Group Operations</p>

    <h2 class="text-5xl font-mono font-bold text-[#0f172a] mb-2">404</h2>
    <h3 class="text-sm font-bold text-[#D71A21] uppercase tracking-widest mb-4">Invalid System Endpoint</h3>
    
    <p class="text-sm text-gray-600 leading-relaxed mb-8">
      The requested corporate directory or resource could not be located on the server. You may have attempted to access a restricted network path or an obsolete URL.
    </p>

    <a href="/" class="inline-flex items-center justify-center w-full bg-[#0f172a] hover:bg-[#D71A21] text-white font-bold py-4 rounded-sm transition-colors uppercase tracking-widest text-xs shadow-md">
      <i class="fa-solid fa-arrow-left mr-3"></i> Return to Secure Portal
    </a>
    
    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-6 font-mono">
      Session IP Logged for Security Purposes
    </p>

  </div>

</body>
</html>
